<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Usuarios — VALTRAX</title>
<link rel="stylesheet" href="assets/css/bootstrap.min.css"/>
<link rel="stylesheet" href="assets/css/theme.min.css"/>
<link rel="stylesheet" href="assets/vendors/fonts/feather.css"/>
<style>
  body{background:#f1f5f9;}
  .page-header{background:#fff;border-bottom:1px solid #e2e8f0;padding:18px 28px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
  .page-title{font-size:20px;font-weight:700;color:#0f172a;margin:0;}
  .card-wrap{background:#fff;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.06);border:1px solid #e2e8f0;overflow:hidden;margin:24px;}
  .card-head{padding:16px 20px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
  .card-title{font-size:14px;font-weight:700;color:#0f172a;margin:0;}
  table{width:100%;border-collapse:collapse;}
  thead th{padding:10px 14px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#94a3b8;background:#f8fafc;border-bottom:1px solid #e2e8f0;}
  tbody td{padding:12px 14px;font-size:13px;color:#334155;border-bottom:1px solid #f1f5f9;vertical-align:middle;}
  tbody tr:hover td{background:#f8fafc;}
  .badge-rol{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;}
  .rol-admin{background:#ede9fe;color:#6d28d9;}
  .rol-vendedor{background:#dbeafe;color:#1d4ed8;}
  .badge-activo{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;}
  .act-si{background:#dcfce7;color:#15803d;}
  .act-no{background:#fee2e2;color:#b91c1c;}
  .btn-act{padding:5px 11px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:5px;transition:opacity .15s;}
  .btn-act:hover{opacity:.8;}
  .btn-edit{background:#eff6ff;color:#2563eb;}
  .btn-del{background:#fef2f2;color:#dc2626;}
  .btn-toggle{background:#f0fdf4;color:#16a34a;}
  /* Modal */
  #overlay{display:none;position:fixed;inset:0;z-index:9000;background:rgba(15,23,42,.55);backdrop-filter:blur(6px);align-items:center;justify-content:center;}
  #overlay.show{display:flex;}
  .modal-box{background:#fff;border-radius:18px;padding:32px 28px;width:90%;max-width:440px;box-shadow:0 24px 60px rgba(0,0,0,.18);}
  .modal-title{font-size:17px;font-weight:700;color:#0f172a;margin:0 0 20px;}
  .form-label{font-size:12px;font-weight:600;color:#64748b;margin-bottom:4px;display:block;}
  .form-ctrl{width:100%;padding:9px 12px;border:1px solid #e2e8f0;border-radius:9px;font-size:13px;outline:none;transition:border-color .15s;box-sizing:border-box;}
  .form-ctrl:focus{border-color:#2563eb;}
  .form-group{margin-bottom:14px;}
  .modal-btns{display:flex;gap:10px;margin-top:20px;}
  .btn-cancel{flex:1;padding:10px;background:#f1f5f9;border:none;border-radius:50px;font-size:13px;font-weight:600;color:#64748b;cursor:pointer;}
  .btn-save{flex:1;padding:10px;background:#2563eb;border:none;border-radius:50px;font-size:13px;font-weight:700;color:#fff;cursor:pointer;}
  .btn-save:hover{background:#1d4ed8;}
  .err-msg{background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:8px 12px;font-size:12px;color:#dc2626;margin-bottom:14px;display:none;}
  #emptyState{display:none;text-align:center;padding:48px;color:#94a3b8;font-size:14px;}
  .search-wrap{position:relative;}
  .search-wrap input{padding-left:34px;}
  .search-wrap i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#94a3b8;font-size:14px;pointer-events:none;}
  .hint-clave{font-size:11px;color:#94a3b8;margin-top:3px;}
</style>
</head>
<body>

<div class="page-header">
  <div style="display:flex;align-items:center;gap:12px;">
    <a href="index.html" style="color:#94a3b8;text-decoration:none;font-size:13px;"><i class="feather-arrow-left me-1"></i>Volver</a>
    <span style="color:#e2e8f0;">|</span>
    <h1 class="page-title"><i class="feather-user-check me-2" style="color:#6d28d9;"></i>Usuarios del Sistema</h1>
  </div>
  <button onclick="abrirNuevo()" style="padding:9px 20px;background:#2563eb;border:none;border-radius:50px;font-size:13px;font-weight:700;color:#fff;cursor:pointer;display:flex;align-items:center;gap:7px;">
    <i class="feather-plus"></i> Nuevo Usuario
  </button>
</div>

<div class="card-wrap">
  <div class="card-head">
    <span class="card-title" id="countLabel">Usuarios</span>
    <div class="search-wrap">
      <i class="feather-search"></i>
      <input id="buscar" class="form-ctrl" style="width:220px;" placeholder="Buscar usuario..." oninput="renderTabla()"/>
    </div>
  </div>
  <table>
    <thead>
      <tr>
        <th>NOMBRE</th>
        <th>USUARIO</th>
        <th>ROL</th>
        <th>ESTADO</th>
        <th>CREADO</th>
        <th style="text-align:right;">ACCIONES</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div id="emptyState">
    <i class="feather-users" style="font-size:36px;display:block;margin-bottom:12px;"></i>
    No hay usuarios registrados.
  </div>
</div>

<!-- Modal Crear / Editar -->
<div id="overlay">
  <div class="modal-box">
    <h4 class="modal-title" id="modalTitle">Nuevo Usuario</h4>
    <div class="err-msg" id="errMsg"></div>
    <input type="hidden" id="editId"/>
    <div class="form-group">
      <label class="form-label">Nombre completo *</label>
      <input id="fNombre" class="form-ctrl" placeholder="Ej: Juan Pérez" maxlength="100"/>
    </div>
    <div class="form-group">
      <label class="form-label">Nombre de usuario *</label>
      <input id="fUsuario" class="form-ctrl" placeholder="Ej: juan.perez" maxlength="60"/>
    </div>
    <div class="form-group">
      <label class="form-label" id="claveLabel">Contraseña *</label>
      <input id="fClave" class="form-ctrl" type="password" placeholder="Mínimo 6 caracteres" maxlength="100"/>
      <p class="hint-clave" id="claveHint">Deja en blanco para mantener la contraseña actual.</p>
    </div>
    <div class="form-group">
      <label class="form-label">Rol</label>
      <select id="fRol" class="form-ctrl">
        <option value="vendedor">Vendedor</option>
        <option value="administrador">Administrador</option>
        <option value="bodega">Bodega</option>
        <option value="compras">Compras</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Estado</label>
      <select id="fActivo" class="form-ctrl">
        <option value="1">Activo</option>
        <option value="0">Inactivo</option>
      </select>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="cerrarModal()">Cancelar</button>
      <button class="btn-save" id="btnGuardar" onclick="guardar()"><i class="feather-save me-1"></i>Guardar</button>
    </div>
  </div>
</div>

<script>
var _datos = [];

function fmtFecha(f){
    if(!f) return '—';
    var s=String(f);
    var d=new Date(s.includes('T')?s:s+'T12:00:00');
    return isNaN(d)?s.slice(0,10):d.toLocaleDateString('es-CL',{day:'2-digit',month:'short',year:'numeric'});
}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

async function cargar(){
    try{
        const r = await fetch('/api/usuarios');
        if(r.ok) _datos = await r.json();
        else _datos = [];
    }catch(_){ _datos = []; }
    renderTabla();
}

function renderTabla(){
    const q = (document.getElementById('buscar').value||'').toLowerCase();
    let filas = _datos;
    if(q) filas = filas.filter(u=>(u.nombre||'').toLowerCase().includes(q)||(u.usuario||'').toLowerCase().includes(q)||(u.rol||'').toLowerCase().includes(q));
    document.getElementById('countLabel').textContent = filas.length + ' usuario' + (filas.length!==1?'s':'');
    const tbody = document.getElementById('tbody');
    const empty = document.getElementById('emptyState');
    if(!filas.length){ tbody.innerHTML=''; empty.style.display='block'; return; }
    empty.style.display='none';
    tbody.innerHTML = filas.map(u=>{
        const rolCss = u.rol==='administrador'?'rol-admin':'rol-vendedor';
        const rolLbl = ({administrador:'Administrador',vendedor:'Vendedor',bodega:'Bodega',compras:'Compras'})[u.rol]||u.rol;
        const actCss = u.activo?'act-si':'act-no';
        const actLbl = u.activo?'Activo':'Inactivo';
        return `<tr>
            <td style="font-weight:600;">${esc(u.nombre)}</td>
            <td><code style="background:#f1f5f9;padding:2px 7px;border-radius:5px;font-size:12px;">${esc(u.usuario)}</code></td>
            <td><span class="badge-rol ${rolCss}">${rolLbl}</span></td>
            <td><span class="badge-activo ${actCss}">${actLbl}</span></td>
            <td style="font-size:12px;color:#94a3b8;">${fmtFecha(u.creado_en)}</td>
            <td style="text-align:right;">
                <div style="display:flex;gap:6px;justify-content:flex-end;">
                    <button class="btn-act btn-edit" onclick="abrirEditar(${u.id})"><i class="feather-edit-2"></i> Editar</button>
                    <button class="btn-act btn-toggle" onclick="toggleActivo(${u.id},${u.activo?0:1})">${u.activo?'<i class="feather-toggle-right"></i> Desactivar':'<i class="feather-toggle-left"></i> Activar'}</button>
                    <button class="btn-act btn-del" onclick="eliminar(${u.id},'${esc(u.nombre)}')"><i class="feather-trash-2"></i></button>
                </div>
            </td>
        </tr>`;
    }).join('');
}

function abrirNuevo(){
    document.getElementById('editId').value = '';
    document.getElementById('modalTitle').textContent = 'Nuevo Usuario';
    document.getElementById('fNombre').value = '';
    document.getElementById('fUsuario').value = '';
    document.getElementById('fClave').value = '';
    document.getElementById('fClave').placeholder = 'Mínimo 6 caracteres';
    document.getElementById('claveLabel').textContent = 'Contraseña *';
    document.getElementById('claveHint').style.display = 'none';
    document.getElementById('fRol').value = 'vendedor';
    document.getElementById('fActivo').value = '1';
    document.getElementById('errMsg').style.display = 'none';
    document.getElementById('overlay').classList.add('show');
    document.getElementById('fNombre').focus();
}

function abrirEditar(id){
    const u = _datos.find(x=>x.id===id);
    if(!u) return;
    document.getElementById('editId').value = id;
    document.getElementById('modalTitle').textContent = 'Editar Usuario';
    document.getElementById('fNombre').value = u.nombre||'';
    document.getElementById('fUsuario').value = u.usuario||'';
    document.getElementById('fClave').value = '';
    document.getElementById('fClave').placeholder = 'Dejar en blanco para no cambiar';
    document.getElementById('claveLabel').textContent = 'Nueva contraseña';
    document.getElementById('claveHint').style.display = 'block';
    document.getElementById('fRol').value = u.rol||'vendedor';
    document.getElementById('fActivo').value = u.activo?'1':'0';
    document.getElementById('errMsg').style.display = 'none';
    document.getElementById('overlay').classList.add('show');
    document.getElementById('fNombre').focus();
}

function cerrarModal(){
    document.getElementById('overlay').classList.remove('show');
}

async function guardar(){
    const id = document.getElementById('editId').value;
    const nombre = document.getElementById('fNombre').value.trim();
    const usuario = document.getElementById('fUsuario').value.trim();
    const clave = document.getElementById('fClave').value;
    const rol = document.getElementById('fRol').value;
    const activo = document.getElementById('fActivo').value === '1';
    const errEl = document.getElementById('errMsg');
    errEl.style.display = 'none';

    if(!nombre){ errEl.textContent='El nombre es obligatorio.'; errEl.style.display='block'; return; }
    if(!usuario){ errEl.textContent='El usuario es obligatorio.'; errEl.style.display='block'; return; }
    if(!id && !clave){ errEl.textContent='La contraseña es obligatoria.'; errEl.style.display='block'; return; }
    if(clave && clave.length < 6){ errEl.textContent='La contraseña debe tener al menos 6 caracteres.'; errEl.style.display='block'; return; }

    const btn = document.getElementById('btnGuardar');
    btn.disabled = true; btn.textContent = 'Guardando…';

    try{
        const body = { nombre, usuario, rol, activo };
        if(clave) body.clave = clave;
        const url = id ? '/api/usuarios/'+id : '/api/usuarios';
        const method = id ? 'PUT' : 'POST';
        const r = await fetch(url,{method,headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
        const data = await r.json();
        if(!r.ok){ errEl.textContent = data.error||'Error al guardar'; errEl.style.display='block'; return; }
        cerrarModal();
        await cargar();
    }catch(e){
        errEl.textContent = 'Error: '+e.message; errEl.style.display='block';
    }finally{
        btn.disabled=false; btn.innerHTML='<i class="feather-save me-1"></i>Guardar';
    }
}

async function toggleActivo(id, nuevoActivo){
    try{
        const u = _datos.find(x=>x.id===id);
        if(!u) return;
        const r = await fetch('/api/usuarios/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({activo:nuevoActivo})});
        if(r.ok){ u.activo=nuevoActivo; renderTabla(); }
    }catch(_){}
}

async function eliminar(id, nombre){
    if(!confirm('¿Eliminar el usuario "'+nombre+'"? Esta acción no se puede deshacer.')) return;
    try{
        const r = await fetch('/api/usuarios/'+id,{method:'DELETE'});
        if(r.ok){ _datos = _datos.filter(u=>u.id!==id); renderTabla(); }
    }catch(_){}
}

// Verificar rol admin
if(localStorage.getItem('vx_rol') !== 'administrador'){
    document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:12px;color:#64748b;"><i class="feather-lock" style="font-size:48px;"></i><p style="font-size:16px;font-weight:600;">Acceso restringido a administradores</p><a href="index.html" style="color:#2563eb;">Volver al inicio</a></div>';
}

// Abrir modal nuevo si viene ?nuevo=1
if(location.search.includes('nuevo=1')) setTimeout(abrirNuevo, 300);

cargar();
</script>
</body>
</html>
