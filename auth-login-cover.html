<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VALTRAX — Iniciar Sesión</title>
  <link rel="icon" href="assets/images/valtrax-icono.svg" type="image/svg+xml" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }

    /* ── Fondo degradado animado ── */
    body {
      background: #020b18;
    }

    .vx-bg {
      position: fixed; inset: 0; z-index: 0;
      overflow: hidden;
    }

    /* Orbs flotantes — movimiento continuo con transform */
    .vx-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: .55;
      will-change: transform;
    }
    .vx-orb1 {
      width: 65vw; height: 65vw;
      background: radial-gradient(circle, #0d2a52 0%, #051428 60%, transparent 100%);
      top: -15%; left: -10%;
      animation: vxOrb1 18s ease-in-out infinite alternate;
    }
    .vx-orb2 {
      width: 55vw; height: 55vw;
      background: radial-gradient(circle, #0a1f3d 0%, #061020 60%, transparent 100%);
      bottom: -20%; right: -10%;
      animation: vxOrb2 22s ease-in-out infinite alternate;
    }
    .vx-orb3 {
      width: 40vw; height: 40vw;
      background: radial-gradient(circle, #0e305a 0%, #071a36 60%, transparent 100%);
      top: 30%; left: 40%;
      animation: vxOrb3 15s ease-in-out infinite alternate;
    }

    @keyframes vxOrb1 {
      0%   { transform: translate(0,    0);    }
      25%  { transform: translate(8vw,  5vh);  }
      50%  { transform: translate(14vw, -4vh); }
      75%  { transform: translate(5vw,  12vh); }
      100% { transform: translate(10vw, 8vh);  }
    }
    @keyframes vxOrb2 {
      0%   { transform: translate(0,     0);    }
      30%  { transform: translate(-10vw, -8vh); }
      60%  { transform: translate(-4vw,  -15vh);}
      100% { transform: translate(-12vw, -6vh); }
    }
    @keyframes vxOrb3 {
      0%   { transform: translate(0,   0);   }
      40%  { transform: translate(-8vw, 6vh); }
      70%  { transform: translate(6vw,  10vh);}
      100% { transform: translate(-4vw, -8vh);}
    }

    /* ── Centrar card ── */
    .vx-center {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* ── Card vidrio ── */
    .vx-card {
      width: 100%;
      max-width: 400px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(24px) saturate(1.2);
      -webkit-backdrop-filter: blur(24px) saturate(1.2);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 42px 38px 36px;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5);
      animation: vxIn .45s cubic-bezier(.4,0,.2,1) both;
    }
    @keyframes vxIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Logo */
    .vx-logo-wrap { text-align: center; margin-bottom: 24px; }
    .vx-logo-wrap img {
      width: 145px;
      filter: brightness(0) invert(1);
      opacity: .88;
    }

    /* Divisor */
    .vx-hr {
      border: none;
      border-top: 1px solid rgba(255,255,255,.09);
      margin: 0 0 26px;
    }

    /* Título */
    .vx-title {
      text-align: center;
      font-size: 1.4rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
    }
    .vx-sub {
      text-align: center;
      font-size: .8rem;
      color: rgba(255,255,255,.4);
      margin-bottom: 26px;
    }

    /* Inputs */
    .vx-field { margin-bottom: 13px; position: relative; }
    .vx-field input {
      width: 100%;
      padding: 12px 18px;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.11);
      border-radius: 50px;
      font-size: .91rem;
      color: #fff;
      outline: none;
      transition: border-color .18s, background .18s;
      font-family: inherit;
    }
    .vx-field input::placeholder { color: rgba(255,255,255,.35); }
    .vx-field input:focus {
      border-color: rgba(80,140,220,.6);
      background: rgba(20,60,120,.2);
    }
    .vx-field input.vx-err { border-color: rgba(239,68,68,.55); }

    /* Ojo */
    .vx-eye {
      position: absolute; right: 15px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: rgba(255,255,255,.3); padding: 0; display: flex;
    }
    .vx-eye:hover { color: rgba(255,255,255,.65); }

    /* Alerta */
    .vx-alert {
      display: none;
      background: rgba(239,68,68,.12);
      border: 1px solid rgba(239,68,68,.3);
      border-radius: 10px;
      padding: 8px 14px;
      font-size: .8rem;
      color: #fca5a5;
      margin-bottom: 12px;
      text-align: center;
    }

    /* Botón */
    .vx-btn {
      width: 100%;
      padding: 12px;
      margin-top: 4px;
      background: rgba(29, 99, 196, 0.7);
      color: #fff;
      border: 1px solid rgba(29,99,196,.5);
      border-radius: 50px;
      font-size: .93rem;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background .18s, transform .1s;
    }
    .vx-btn:hover { background: rgba(29,99,196,.88); }
    .vx-btn:active { transform: scale(.98); }
    .vx-btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }

    /* Spinner */
    @keyframes vxSpin { to { transform: rotate(360deg); } }
    .vx-spinner {
      display: inline-block; width: 13px; height: 13px;
      border: 2px solid rgba(255,255,255,.25);
      border-top-color: #fff; border-radius: 50%;
      animation: vxSpin .7s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }

    /* Footer */
    .vx-footer {
      text-align: center; margin-top: 24px;
      font-size: .73rem; color: rgba(255,255,255,.18);
    }

    /* Fade out al redirigir */
    body.vx-out .vx-card {
      opacity: 0; transform: translateY(-6px);
      transition: opacity .22s ease, transform .22s ease;
    }
  </style>
</head>
<body>

  <div class="vx-bg">
    <div class="vx-orb vx-orb1"></div>
    <div class="vx-orb vx-orb2"></div>
    <div class="vx-orb vx-orb3"></div>
  </div>

  <div class="vx-center">
    <div class="vx-card">

      <div class="vx-logo-wrap">
        <img src="assets/images/valtrax-logo.svg" alt="Valtrax" />
      </div>
      <hr class="vx-hr" />

      <h1 class="vx-title">Bienvenido</h1>
      <p class="vx-sub">Ingresá tus credenciales para continuar</p>

      <form id="loginForm" onsubmit="return false;" autocomplete="off">
        <div class="vx-field">
          <input id="vxUser" type="text" placeholder="Usuario" autocomplete="username" />
        </div>
        <div class="vx-field">
          <input id="vxPass" type="password" placeholder="Contraseña" autocomplete="current-password" style="padding-right:42px;" />
          <button type="button" class="vx-eye" id="vxEyeBtn" aria-label="Ver contraseña">
            <svg id="vxEyeIco" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                 viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <div class="vx-alert" id="vxAlert"></div>
        <button type="submit" class="vx-btn" id="vxBtn">Iniciar Sesión</button>
      </form>

      <p class="vx-footer">VALTRAX Industrial SPA &copy; 2025</p>
    </div>
  </div>

<script>
(function () {
  'use strict';

  var USUARIOS = [
    { usuario: 'valtrax.admin', clave: 'Vx@2025!', rol: 'administrador', nombre: 'Administrador' },
    { usuario: 'vendedor',      clave: 'venta123',  rol: 'vendedor',      nombre: 'Vendedor'      }
  ];

  if (localStorage.getItem('vx_usuario') && localStorage.getItem('vx_rol')) {
    location.replace('index.html');
  }

  var inpUser = document.getElementById('vxUser');
  var inpPass = document.getElementById('vxPass');
  var alertEl = document.getElementById('vxAlert');
  var btn     = document.getElementById('vxBtn');

  document.getElementById('vxEyeBtn').addEventListener('click', function () {
    var show = inpPass.type === 'password';
    inpPass.type = show ? 'text' : 'password';
    document.getElementById('vxEyeIco').innerHTML = show
      ? '<line x1="1" y1="1" x2="23" y2="23"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 11 7 11 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 1 12s4 7 11 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="1" y1="1" x2="23" y2="23"/>'
      : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  });

  [inpUser, inpPass].forEach(function (el) {
    el.addEventListener('keydown', function (e) { if (e.key === 'Enter') btn.click(); });
    el.addEventListener('input', function () {
      el.classList.remove('vx-err');
      alertEl.style.display = 'none';
    });
  });

  btn.addEventListener('click', async function () {
    var u = inpUser.value.trim(), p = inpPass.value;
    alertEl.style.display = 'none';
    inpUser.classList.remove('vx-err');
    inpPass.classList.remove('vx-err');

    if (!u) { inpUser.classList.add('vx-err'); inpUser.focus(); return; }
    if (!p) { inpPass.classList.add('vx-err'); inpPass.focus(); return; }

    btn.disabled = true;
    btn.innerHTML = '<span class="vx-spinner"></span>Ingresando...';

    var match = null;

    // 1. Intentar autenticar contra la API (DB)
    try {
      var res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ usuario: u, clave: p })
      });
      if (res.ok) {
        var data = await res.json();
        if (data.ok) match = { nombre: data.nombre, rol: data.rol };
      }
    } catch (_) {}

    // 2. Fallback a usuarios locales si la DB no está disponible
    if (!match) {
      var LOCAL = [
        { usuario: 'valtrax.admin', clave: 'Vx@2025!', rol: 'administrador', nombre: 'Administrador' },
        { usuario: 'vendedor',      clave: 'venta123',  rol: 'vendedor',      nombre: 'Vendedor'      }
      ];
      var localMatch = LOCAL.find(function(x){ return x.usuario===u && x.clave===p; });
      if (localMatch) match = { nombre: localMatch.nombre, rol: localMatch.rol };
    }

    if (!match) {
      alertEl.textContent = 'Usuario o contraseña incorrectos.';
      alertEl.style.display = 'block';
      inpUser.classList.add('vx-err');
      inpPass.classList.add('vx-err');
      inpPass.value = '';
      inpUser.focus();
      btn.disabled = false;
      btn.innerHTML = 'Ingresar';
      return;
    }

    localStorage.setItem('vx_usuario', match.nombre);
    localStorage.setItem('vx_rol', match.rol);
    setTimeout(function () {
      document.body.classList.add('vx-out');
      setTimeout(function () { location.href = 'index.html'; }, 240);
    }, 320);
  });
})();
</script>
</body>
</html>
